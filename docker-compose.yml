services:

  postgres:
    image: postgres:16-alpine
    container_name: cookie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cookie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cookie"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Server/cookie-server-spring-boot
      dockerfile: Dockerfile
    container_name: cookie-backend
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cookie
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cookie-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
